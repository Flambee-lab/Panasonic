<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create a new elevator</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Open+Sans:wght@700&family=Roboto:wght@400;500&display=swap");

      :root {
        --bg-0: #080a10;
        --bg-1: #0d111a;
        --bg-2: #121a26;
        --panel: rgba(17, 24, 38, 0.78);
        --panel-solid: #101726;
        --panel-soft: #171f2f;
        --text-0: #e9edf5;
        --text-1: #bdc7d8;
        --text-2: #8f9aaf;
        --accent: #7bb0ff;
        --accent-strong: #5f96ff;
        --accent-soft: rgba(123, 176, 255, 0.18);
        --onboard-accent: #6266e6;
        --onboard-left: #13141a;
        --onboard-right: #171b24;
        --onboard-border: rgba(255, 255, 255, 0.08);
        --onboard-text-secondary: #979797;
        /* Ancho fijo común: cabe la etiqueta más larga del wizard ("Finish setup" / "Create admin") */
        --wizard-btn-fixed-width: 176px;
        --ok: #60c899;
        --warn: #e9c46a;
        --danger: #ff7a88;
        --line: rgba(188, 200, 218, 0.12);
        --line-soft: rgba(188, 200, 218, 0.07);
        --radius-lg: 18px;
        --radius-md: 12px;
        --radius-sm: 10px;
        --shadow-xl: 0 20px 60px rgba(0, 0, 0, 0.5);
        --shadow-md: 0 12px 30px rgba(0, 0, 0, 0.36);
        --font: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto,
          Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
        /* Dashboard (Figma node 0:3258) */
        --dash-root: #1e202a;
        --dash-sidebar: #24252f;
        --dash-column: #1e202a;
        --dash-search-bg: #22242d;
        --dash-border-subtle: rgba(255, 255, 255, 0.06);
        --dash-border-cell: rgba(255, 255, 255, 0.04);
        --dash-toolbar-split: #31333d;
        --dash-toolbar-bg: #262832;
        --dash-controls-pill-radius: 32px;
        --dash-filters-bg: rgba(103, 103, 118, 0.2);
        --dash-thumb-border: #676776;
        --dash-sidebar-w: 64px;
        /* Dashboard — interacción unificada (hover / active / disabled) */
        --dash-inter-ease: 150ms ease-out;
        --dash-inter-fg: rgba(255, 255, 255, 0.6);
        --dash-inter-fg-hover: rgba(255, 255, 255, 0.82);
        --dash-inter-line: rgba(255, 255, 255, 0.06);
        --dash-inter-line-hover: rgba(255, 255, 255, 0.12);
        --dash-inter-fill: rgba(255, 255, 255, 0.02);
        --dash-inter-fill-hover: rgba(255, 255, 255, 0.08);
        --dash-inter-fill-active: rgba(255, 255, 255, 0.11);
        --dash-inter-disabled-opacity: 0.36;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        font-family: var(--font);
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        min-height: 100%;
        overflow: hidden;
        background: var(--bg-0);
        color: var(--text-0);
        font-family: var(--font);
        line-height: 1.4;
      }

      input,
      button,
      select,
      textarea {
        font-family: inherit;
      }

      input:where([type="text"], [type="password"], [type="search"], [type="email"], [type="number"], [type="tel"], [type="url"]),
      textarea,
      select {
        border-radius: 8px;
      }

      .app-root {
        width: 100%;
        height: 100%;
        min-height: 100vh;
      }

      .hidden {
        display: none !important;
      }

      .fade-enter {
        animation: fadeEnter 320ms ease forwards;
      }

      .fade-exit {
        animation: fadeExit 320ms ease forwards;
      }

      @keyframes fadeEnter {
        from {
          opacity: 0;
          transform: scale(0.988);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }

      @keyframes fadeExit {
        from {
          opacity: 1;
          transform: scale(1);
        }
        to {
          opacity: 0;
          transform: scale(0.988);
        }
      }

      .screen {
        width: 100%;
        min-height: 100vh;
      }

      /* Elevator form — Figma 350:1736 */
      .wizard-screen {
        position: relative;
        width: 100%;
        min-height: 100vh;
        height: 100vh;
        overflow: hidden;
        background: #13141a;
        letter-spacing: -0.4px;
      }

      .wizard-shell {
        position: relative;
        z-index: 1;
        width: 100%;
        height: 100%;
        min-height: 100vh;
        display: grid;
        grid-template-columns: minmax(420px, 38vw) minmax(0, 1fr);
        grid-template-rows: minmax(0, 1fr);
        overflow: hidden;
        background: #13141a;
      }

      .elevator-topbar {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 24px;
        height: 56px;
        padding: 0 24px;
        z-index: 10;
        background: transparent;
        pointer-events: none;
      }

      .elevator-topbar__left,
      .elevator-topbar__right,
      .elevator-topbar__back,
      .elevator-topbar__menu,
      .elevator-topbar__link {
        pointer-events: auto;
      }

      .elevator-topbar__left,
      .elevator-topbar__right {
        display: flex;
        align-items: center;
        gap: 16px;
        min-width: 0;
      }

      .elevator-topbar__right {
        margin-left: auto;
        justify-content: flex-end;
      }

      .elevator-topbar__back,
      .elevator-topbar__menu {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 32px;
        height: 32px;
        padding: 0;
        border: 0;
        border-radius: 6px;
        background: transparent;
        cursor: pointer;
        color: #fff;
      }

      .elevator-topbar__back:hover,
      .elevator-topbar__menu:hover {
        background: rgba(255, 255, 255, 0.06);
      }

      .elevator-topbar__back img,
      .elevator-topbar__menu img {
        display: block;
        width: 20px;
        height: 20px;
      }

      .elevator-topbar__context {
        font-size: 16px;
        font-weight: 700;
        line-height: 20px;
        letter-spacing: -0.4px;
        color: #fff;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .elevator-topbar__link {
        border: 0;
        background: transparent;
        padding: 0;
        font-size: 14px;
        font-weight: 500;
        line-height: 20px;
        letter-spacing: -0.4px;
        color: rgba(255, 255, 255, 0.6);
        text-decoration: underline;
        cursor: pointer;
      }

      .wizard-illustration {
        grid-row: 1;
        grid-column: 1;
        position: relative;
        min-height: 0;
        overflow: hidden;
        background: #13141a;
      }

      .wizard-illustration-art {
        position: absolute;
        inset: 0;
      }

      .wizard-illustration-stack {
        position: absolute;
        inset: 0;
        overflow: hidden;
      }

      .wizard-illustration-img {
        position: absolute;
        inset: 0;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        max-width: none;
        object-fit: cover;
        object-position: var(--illustration-object-position, center center);
        opacity: 0;
        z-index: 1;
        pointer-events: none;
        user-select: none;
      }

      .wizard-illustration-img.is-layer-active {
        z-index: 2;
        transition: opacity 380ms cubic-bezier(0.4, 0, 0.2, 1);
      }

      .wizard-illustration-img[style*="animation"] {
        transition: none;
      }

      @keyframes illustration-exit {
        0% {
          opacity: var(--illustration-from-opacity, 1);
        }
        100% {
          opacity: 0;
        }
      }

      @keyframes illustration-enter {
        0% {
          opacity: 0;
        }
        100% {
          opacity: var(--illustration-target-opacity, 1);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .wizard-illustration-img {
          animation-duration: 0.01ms !important;
        }
      }

      .wizard-illustration-art:not(.is-illustration-asset) .wizard-illustration-img.is-layer-active {
        opacity: 0.3;
      }

      .wizard-illustration-art.is-illustration-asset .wizard-illustration-img.is-layer-active {
        opacity: 1;
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        color: var(--text-1);
        font-size: 13px;
        letter-spacing: 0.01em;
      }

      .brand-dot {
        width: 9px;
        height: 9px;
        border-radius: 999px;
        background: linear-gradient(135deg, #70a6ff, #80d1ff);
        box-shadow: 0 0 16px rgba(112, 166, 255, 0.65);
      }

      .wizard-content {
        grid-row: 1;
        grid-column: 2;
        position: relative;
        display: flex;
        flex-direction: column;
        min-height: 0;
        overflow: hidden;
        padding: 56px 28px 56px;
        background: #171b24;
      }

      .wizard-content-inner {
        flex: 1 1 auto;
        min-height: 0;
        width: 100%;
        max-width: none;
        display: flex;
        flex-direction: column;
        gap: 48px;
        overflow: hidden;
        padding-right: 0;
      }

      .elevator-form-title {
        margin: 0;
        flex-shrink: 0;
        font-size: 24px;
        font-weight: 600;
        line-height: 1.15;
        letter-spacing: -0.4px;
        color: #fff;
      }

      .elevator-form {
        display: flex;
        flex: 1 1 auto;
        flex-direction: column;
        gap: 48px;
        width: 100%;
        min-height: 0;
        overflow: hidden;
        padding-left: 16px;
        padding-right: 16px;
        box-sizing: border-box;
      }

      .elevator-form-fields {
        display: flex;
        flex-direction: column;
        gap: 20px;
        width: 100%;
        flex-shrink: 0;
      }

      .elevator-form-grid {
        display: grid;
        gap: 20px;
        width: 100%;
      }

      .form-card__body.elevator-form-grid {
        gap: 20px;
      }

      .elevator-form-grid--2 {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .elevator-form-grid--3 {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .elevator-form .field {
        display: flex;
        flex-direction: column;
        gap: 4px;
        min-width: 0;
      }

      .elevator-form .field label,
      .elevator-form .field-heading label {
        font-size: 14px;
        font-weight: 600;
        line-height: 20px;
        letter-spacing: -0.4px;
        color: rgba(255, 255, 255, 0.8);
        font-synthesis: none;
      }

      .elevator-form .field-label-muted {
        color: rgba(255, 255, 255, 0.8);
      }

      .field-hint {
        margin: 0;
        font-size: 12px;
        font-weight: 400;
        line-height: 1.35;
        letter-spacing: -0.4px;
        color: var(--onboard-text-secondary);
      }

      .field-heading {
        display: flex;
        flex-direction: column;
        gap: 0;
      }

      .field-heading--row {
        flex-direction: row;
        align-items: flex-start;
        justify-content: space-between;
        gap: 8px;
      }

      .field-stacked {
        gap: 6px;
      }

      .elevator-form .field > input[type="text"],
      .elevator-form .field > input[type="number"],
      .elevator-form .custom-dropdown__trigger,
      .elevator-form .field-input {
        box-sizing: border-box;
        height: 40px;
        min-height: 40px;
        max-height: 40px;
        border: 1px solid var(--onboard-border);
        border-radius: 8px;
        background: #151820;
        outline: none;
        transition: border-color 160ms ease, box-shadow 160ms ease, background 160ms ease, color 160ms ease,
          font-weight 160ms ease;
      }

      .elevator-form .field > input[type="text"],
      .elevator-form .field > input[type="number"] {
        width: 100%;
        color: rgba(255, 255, 255, 0.4);
        font-size: 14px;
        font-weight: 400;
        line-height: 38px;
        letter-spacing: -0.4px;
        padding: 0 12px;
      }

      .elevator-form .field-input input[type="number"] {
        width: 100%;
        font-size: 14px;
        font-weight: 500;
        line-height: 20px;
        letter-spacing: -0.4px;
        color: #fff;
      }

      .elevator-form .field > input::placeholder {
        color: rgba(255, 255, 255, 0.4);
        font-weight: 400;
      }

      .elevator-form .field > input[type="text"]:not(:placeholder-shown) {
        font-weight: 500;
        color: #fff;
      }

      .elevator-form .field > input:focus {
        background: rgba(19, 20, 26, 0.8);
        border-color: #ffffff;
        box-shadow: none;
      }

      .field[data-illustration-key="description"] > input {
        background: #171b24;
      }

      .field[data-illustration-key="description"] > input:focus {
        border-color: #ffffff;
        box-shadow: none;
      }

      .elevator-form input[type="number"] {
        -moz-appearance: textfield;
        appearance: textfield;
      }

      .elevator-form input[type="number"]::-webkit-outer-spin-button,
      .elevator-form input[type="number"]::-webkit-inner-spin-button {
        -webkit-appearance: none;
        margin: 0;
      }

      .field-input {
        position: relative;
        display: flex;
        align-items: center;
        width: 100%;
        padding: 0;
      }

      .field-input input {
        flex: 1 1 auto;
        min-width: 0;
        width: 100%;
        height: 100%;
        min-height: 0;
        max-height: none;
        margin: 0;
        border: 0;
        border-radius: 0;
        background: transparent;
        box-shadow: none;
        outline: none;
        padding: 0 12px;
        line-height: 20px;
        letter-spacing: -0.4px;
      }

      .field-input input:focus {
        background: transparent;
        border: 0;
        box-shadow: none;
        outline: none;
      }

      .field-input:focus-within {
        border-color: #ffffff;
        box-shadow: none;
      }

      .field-input--suffix input {
        padding-right: 88px;
      }

      .field-suffix {
        position: absolute;
        right: 12px;
        font-size: 12px;
        font-weight: 300;
        line-height: 1.25;
        letter-spacing: -0.4px;
        color: rgba(255, 255, 255, 0.4);
        white-space: nowrap;
        pointer-events: none;
      }

      .field-input--unit {
        display: flex;
        align-items: center;
        width: 100%;
        max-width: 100%;
        gap: 8px;
        padding: 0 6px 0 12px;
        overflow: hidden;
      }

      .field-input--unit input {
        flex: 1 1 0;
        min-width: 0;
        width: 0;
        padding: 0;
      }

      .field-input--unit .unit-segment {
        flex-shrink: 0;
        display: inline-flex;
        align-items: center;
        margin: 0;
        padding: 0;
        border: 0;
        border-radius: 0;
        background: transparent;
        box-shadow: none;
      }

      .custom-dropdown.is-open {
        z-index: 30;
      }

      .unit-segment {
        display: inline-flex;
        align-items: center;
        gap: 0;
        flex-shrink: 0;
        padding: 0;
        border: 0;
        border-radius: 0;
        background: transparent;
        box-shadow: none;
      }

      .unit-segment__btn {
        border: 0;
        background: transparent;
        color: rgba(255, 255, 255, 0.4);
        font-size: 14px;
        font-weight: 500;
        line-height: 20px;
        letter-spacing: -0.4px;
        padding: 2px 8px;
        border-radius: 2px;
        min-width: 40px;
        cursor: pointer;
        text-align: center;
      }

      .unit-segment__btn.is-active {
        background: #23262f;
        color: #fff;
      }

      .custom-dropdown__root {
        position: relative;
        width: 100%;
      }

      .custom-dropdown__trigger {
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        padding: 0 4px 0 12px;
        color: rgba(255, 255, 255, 0.4);
        font-size: 14px;
        font-weight: 400;
        line-height: 20px;
        letter-spacing: -0.4px;
        cursor: pointer;
        text-align: left;
        transition: border-color 160ms ease, border-radius 160ms ease, box-shadow 160ms ease, color 160ms ease,
          font-weight 160ms ease;
      }

      .custom-dropdown__label {
        flex: 1 1 auto;
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-size: 14px;
        line-height: 20px;
        letter-spacing: -0.4px;
      }

      .custom-dropdown__label.is-placeholder {
        color: rgba(255, 255, 255, 0.4);
        font-weight: 400;
      }

      .custom-dropdown__label:not(.is-placeholder) {
        color: #fff;
        font-weight: 500;
      }

      .custom-dropdown__trigger:focus {
        border-color: #ffffff;
        box-shadow: none;
        outline: none;
      }

      .custom-dropdown.is-open .custom-dropdown__trigger {
        border-color: #ffffff;
        border-bottom-color: transparent;
        border-radius: 8px 8px 0 0;
        box-shadow: none;
        z-index: 21;
        position: relative;
      }

      .custom-dropdown__chev {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 28px;
        height: 28px;
        flex-shrink: 0;
        border-radius: 4px;
        background: rgba(255, 255, 255, 0.05);
        transition: transform 160ms ease;
      }

      .custom-dropdown.is-open .custom-dropdown__chev {
        transform: rotate(180deg);
      }

      .custom-dropdown__chev img {
        display: block;
      }

      .custom-dropdown__panel {
        position: absolute;
        top: 100%;
        left: 0;
        right: 0;
        z-index: 20;
        margin: 0;
        padding: 4px 0;
        list-style: none;
        border: 1px solid #ffffff;
        border-top: 0;
        border-radius: 0 0 8px 8px;
        background: #12161d;
        box-shadow: 0 14px 28px rgba(0, 0, 0, 0.42);
        max-height: 148px;
        overflow-y: auto;
      }

      .custom-dropdown__panel[hidden] {
        display: none;
      }

      .custom-dropdown__option {
        width: 100%;
        border: 0;
        background: transparent;
        padding: 9px 12px;
        text-align: left;
        font-size: 14px;
        font-weight: 400;
        line-height: 20px;
        letter-spacing: -0.4px;
        color: rgba(255, 255, 255, 0.88);
        cursor: pointer;
      }

      .custom-dropdown__option:hover,
      .custom-dropdown__option.is-selected {
        background: rgba(98, 102, 230, 0.18);
        color: #fff;
      }

      .form-card {
        display: flex;
        flex-direction: column;
        gap: 2px;
        width: 100%;
        flex-shrink: 1;
        min-height: 0;
      }

      .form-card__header {
        margin: 0;
        padding: 6px 12px;
        border-radius: 8px 8px 0 0;
        background: rgba(255, 255, 255, 0.05);
        font-family: "Open Sans", var(--font);
        font-size: 14px;
        font-weight: 700;
        line-height: 20px;
        letter-spacing: -0.4px;
        color: #f1f1f1;
      }

      .form-card__body {
        padding: 12px;
        border-radius: 0 0 8px 8px;
        background: #1c202a;
      }

      .toggle-switch {
        position: relative;
        display: inline-flex;
        flex-shrink: 0;
        width: 29px;
        height: 16px;
        cursor: pointer;
      }

      .toggle-switch__input {
        position: absolute;
        opacity: 0;
        width: 0;
        height: 0;
      }

      .toggle-switch__visual {
        display: block;
        width: 29px;
        height: 16px;
        background: url("/assets/elevator-form/icon-toggle.svg") center / contain no-repeat;
        transition: filter 160ms ease, opacity 160ms ease;
      }

      .toggle-switch__input:not(:checked) + .toggle-switch__visual {
        filter: grayscale(1) brightness(0.55);
        opacity: 0.7;
      }

      .elevator-form-footer {
        position: absolute;
        right: 16px;
        bottom: 16px;
        z-index: 6;
        display: flex;
        justify-content: flex-end;
        margin: 0;
        padding: 0;
        background: none;
      }

      .btn-save {
        min-width: 80px;
        height: auto;
        padding: 9px 16px 7px;
        border: 0;
        border-radius: 8px;
        background: #6266e6;
        color: #fff;
        font-size: 14px;
        font-weight: 500;
        line-height: 20px;
        letter-spacing: -0.4px;
        box-shadow: none;
        cursor: pointer;
      }

      .btn-save:hover:not(:disabled) {
        filter: brightness(1.06);
        transform: none;
      }

      /* Solo hueco para que el último texto no quede bajo el botón (absolute, fuera del flujo) */
      .wizard-panel > div:first-child {
        flex: 0 1 auto;
        min-height: 0;
        max-height: 100%;
        width: 100%;
        max-width: 560px;
        margin-left: auto;
        margin-right: auto;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding-bottom: calc(16px + 40px);
        overflow-x: hidden;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
      }

      .wizard-panel > div:first-child .content-header {
        width: 100%;
        max-width: 560px;
      }

      .wizard-panel[data-step-panel="1"] > div:first-child .content-header {
        max-width: 480px;
      }

      .wizard-panel > div:first-child .admin-form {
        width: 100%;
        max-width: 480px;
      }

      /* Pasos 2 y 3: misma columna y ritmo que el paso 1 (480px como el formulario) */
      .wizard-panel[data-step-panel="2"] > div:first-child .content-header,
      .wizard-panel[data-step-panel="3"] > div:first-child .content-header {
        max-width: 480px;
      }

      .wizard-panel > div:first-child .setup-options,
      .wizard-panel > div:first-child .setup-section {
        width: 100%;
        max-width: 560px;
      }

      .wizard-panel[data-step-panel="2"] > div:first-child .setup-options,
      .wizard-panel[data-step-panel="3"] > div:first-child .setup-section {
        max-width: 480px;
      }

        color: rgba(255, 255, 255, 0.8);
        font-size: 12px;
        font-weight: 400;

      .requirement-item {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        color: rgba(255, 255, 255, 0.6);
        font-size: 12px;
      }

      .requirement-check {
        width: 16px;
        height: 16px;
        border-radius: 4px;
        background: #424348;
        color: transparent;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        font-weight: 700;
        flex-shrink: 0;
        color: #171b24;
      }

      .requirement-item.active .requirement-check {
        color: #ffffff;
      }

      .requirement-item .requirement-text {
        color: rgba(255, 255, 255, 0.6);
      }

      .requirement-item.active .requirement-text {
        color: #ffffff;
      }

      .password-rules ul {
        margin: 0;
        padding-left: 18px;
        color: var(--onboard-text-secondary);
        font-size: 12px;
        display: grid;
        gap: 5px;
      }

      .wizard-actions {
        display: flex;
        justify-content: flex-end;
        align-items: center;
        gap: 10px;
        margin: 0;
        padding: 0;
      }

      .wizard-content .wizard-actions--footer {
        position: sticky;
        bottom: 0;
        left: 0;
        right: 0;
        z-index: 3;
        margin-top: 8px;
        padding: 16px 0 8px;
        background: linear-gradient(180deg, rgba(23, 27, 36, 0) 0%, rgba(23, 27, 36, 0.92) 28%, rgba(23, 27, 36, 0.98) 100%);
      }

      /* Botones del wizard: misma anchura, altura y tipografía en todos los pasos (sin salto de layout) */
      .wizard-content .wizard-actions .btn {
        box-sizing: border-box;
        width: var(--wizard-btn-fixed-width);
        min-width: var(--wizard-btn-fixed-width);
        flex: 0 0 var(--wizard-btn-fixed-width);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 11px 16px;
        min-height: 42px;
        border-radius: 11px;
        font-family: var(--font);
        font-size: 14px;
        font-weight: 600;
        line-height: 1.2;
        text-align: center;
      }

      .wizard-panel {
        display: flex;
        flex: 0 0 auto;
        width: 100%;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        overflow: visible;
      }

      .wizard-panel > div:first-child {
        padding-bottom: 0;
      }

      .setup-options {
        width: min(100%, 560px);
        display: grid;
        gap: 32px;
      }

      .setup-section {
        display: grid;
        gap: 11px;

      .setup-section h4 {
        margin: 0;
        font-size: 15px;
        color: rgba(255, 255, 255, 0.8);
        letter-spacing: -0.02em;
      }

      /* Step 2 — filas con toggle personalizado (spec estricta) */
      .wizard-panel[data-step-panel="2"] .setting-row {
        position: relative;
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px 14px;
        min-height: 48px;
        border: 1px solid rgba(255, 255, 255, 0.04);
        border-radius: 8px;
        background: transparent;
        cursor: pointer;
        transition:
          background 0.22s ease,
          border-color 0.22s ease,
          filter 0.2s ease,
          box-shadow 0.22s ease;
      }

      .wizard-panel[data-step-panel="2"] .setting-row:hover {
        filter: brightness(1.07);
      }

      .wizard-panel[data-step-panel="2"] .setting-row:has(.wiz-toggle-input:focus-visible) {
        outline: 2px solid rgba(98, 102, 230, 0.55);
        outline-offset: 2px;
      }

      .wizard-panel[data-step-panel="2"] .setting-row:has(.wiz-toggle-input:checked) {
        background: rgba(255, 255, 255, 0.08);
        border-color: rgba(255, 255, 255, 0.12);
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.04);
      }

      .wizard-panel[data-step-panel="2"] .wiz-toggle-input {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        margin: 0;
        opacity: 0;
        cursor: pointer;
        z-index: 3;
      }

      .wizard-panel[data-step-panel="2"] .wiz-toggle {
        position: relative;
        flex-shrink: 0;
        z-index: 0;
        pointer-events: none;
      }

      .wizard-panel[data-step-panel="2"] .wiz-toggle__track {
        display: block;
        width: 44px;
        height: 24px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.1);
        transition: background 0.25s ease, box-shadow 0.25s ease;
        position: relative;
      }

      .wizard-panel[data-step-panel="2"] .wiz-toggle-input:checked ~ .wiz-toggle .wiz-toggle__track {
        background: var(--onboard-accent);
        box-shadow: 0 0 0 1px rgba(98, 102, 230, 0.45);
      }

      .wizard-panel[data-step-panel="2"] .wiz-toggle__thumb {
        position: absolute;
        top: 2px;
        left: 2px;
        width: 20px;
        height: 20px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.95);
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.22);
        transition: transform 0.28s cubic-bezier(0.4, 0, 0.2, 1);
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .wizard-panel[data-step-panel="2"] .wiz-toggle-input:checked ~ .wiz-toggle .wiz-toggle__thumb {
        transform: translateX(20px);
      }

      .wizard-panel[data-step-panel="2"] .wiz-toggle__glyph {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 11px;
        font-weight: 700;
        line-height: 1;
        transition: opacity 0.2s ease;
      }

      .wizard-panel[data-step-panel="2"] .wiz-toggle__glyph--off {
        color: rgba(55, 60, 80, 0.55);
        opacity: 1;
      }

      .wizard-panel[data-step-panel="2"] .wiz-toggle__glyph--on {
        color: var(--onboard-accent);
        opacity: 0;
      }

      .wizard-panel[data-step-panel="2"] .wiz-toggle-input:checked ~ .wiz-toggle .wiz-toggle__glyph--off {
        opacity: 0;
      }

      .wizard-panel[data-step-panel="2"] .wiz-toggle-input:checked ~ .wiz-toggle .wiz-toggle__glyph--on {
        opacity: 1;
      }

      .wizard-panel[data-step-panel="2"] .row-text {
        flex: 1;
        min-width: 0;
        font-family: var(--font);
        font-size: 13px;
        font-weight: 400;
        color: rgba(255, 255, 255, 0.82);
        line-height: 1.38;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
        z-index: 1;
      }

      .toggle-switch {
        position: relative;
        width: 36px;
        height: 20px;
        flex-shrink: 0;
      }

      .toggle-switch input {
        position: absolute;
        opacity: 0;
        pointer-events: none;
      }

      .toggle-slider {
        position: absolute;
        inset: 0;
        border-radius: 999px;
        background: rgba(136, 153, 182, 0.32);
        transition: background 180ms ease;
      }

      .toggle-slider::after {
        content: "";
        position: absolute;
        top: 2px;
        left: 2px;
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background: #dbe6f9;
        transition: transform 180ms ease;
      }

      .toggle-switch input:checked + .toggle-slider {
        background: rgba(98, 102, 230, 0.9);
      }

      .toggle-switch input:checked + .toggle-slider::after {
        transform: translateX(16px);
      }

      .check-list,

      .check-row,
      .radio-row {
        display: grid;
        grid-template-columns: 18px 1fr;

        column-gap: 10px;
        border: 1px solid rgba(156, 177, 214, 0.16);
        border-radius: 10px;
        padding: 10px 12px;
        background: rgba(12, 19, 31, 0.5);
      }

      .check-row input,
      .radio-row input {
        margin-top: 2px;
      }

      .check-row label,
      .radio-row label {
        font-size: 13px;
        color: #c7d4ea;
      }

      .radio-helper {
        margin-top: 3px;
        font-size: 12px;
        color: #8da0bf;
      }

      .finish-box {
        width: min(100%, 520px);
        border: 1px solid rgba(96, 200, 153, 0.28);
        background: rgba(26, 52, 42, 0.28);
        border-radius: 12px;
        padding: 14px 16px;
        color: #c8eedc;
        font-size: 13px;
      }

      .adapter-list {
        width: min(100%, 480px);
        display: grid;
        gap: 10px;
      }

      .adapter-row {
        display: grid;
        grid-template-columns: 30px minmax(0, 1fr) auto;
        align-items: center;
        gap: 12px;
        border: 1px solid var(--onboard-border);
        border-radius: 8px;
        padding: 12px;
        background: rgba(19, 20, 26, 0.45);
        cursor: pointer;
        transition: border-color 160ms ease, background 160ms ease, opacity 160ms ease;
      }

      .adapter-row:hover {
        border-color: rgba(98, 102, 230, 0.4);
      }

      .adapter-row input {
        margin: 0;
      }

      /* Radio a 20px: escala cercana al thumb del toggle del paso 2 */
      .adapter-row input[type="radio"] {

        flex-shrink: 0;
        accent-color: var(--onboard-accent);

      .adapter-main {
        min-width: 0;
      }

      .adapter-name {
        margin: 0;
        font-family: var(--font);
        font-size: 14px;
        font-weight: 600;
        letter-spacing: -0.02em;
        color: rgba(255, 255, 255, 0.82);
      }

      .adapter-ip {
        margin-top: 2px;
        color: var(--onboard-text-secondary);
        font-size: 12px;
      }

      .adapter-meta {

      }

      .adapter-devices {
        color: #bfcde5;
        font-size: 12px;
      }

      .adapter-status {
        margin-top: 2px;
        font-size: 12px;
        font-weight: 600;
      }

      .adapter-status.connected {
        color: #87ddb4;
      }

      .adapter-status.disconnected {
        color: #9aa8bf;
      }

      .adapter-row:has(input:checked) {
        border-color: rgba(98, 102, 230, 0.8);
        background: rgba(98, 102, 230, 0.14);
        box-shadow: inset 0 0 0 1px rgba(98, 102, 230, 0.24);

      .btn-row {
        display: flex;
        gap: 10px;
        margin-top: auto;
        padding-top: 20px;
      }

      .btn {
        border: 1px solid transparent;
        border-radius: 11px;
        padding: 11px 16px;
        min-height: 42px;
        font-size: 14px;
        font-weight: 600;
        color: var(--text-0);
        background: #1f2b3f;
        cursor: pointer;
        transition: all 180ms ease;

      .btn:hover:not(:disabled) {

      .btn:active:not(:disabled) {

      .btn:disabled {

      .btn.primary {

          transform var(--dash-inter-ease),

      @keyframes change-ip-rule-in {
        from {
          opacity: 0;
          transform: scaleY(0.5);
        }
        to {
          opacity: 1;
          transform: scaleY(1);
        }
      }

      .change-ip-flyout__btn {
        position: relative;
        overflow: hidden;
        opacity: 0;
        transform: translateX(-10px) scale(0.97);
      }

      .change-ip-flyout__btn::after {
        content: "";
        position: absolute;
        top: 0;
        left: -40%;
        width: 55%;
        height: 2px;
        border-radius: 2px;
        pointer-events: none;
        z-index: 1;
        opacity: 0;
        background: linear-gradient(
          90deg,
          transparent 0%,
          rgba(98, 102, 230, 0.85) 35%,
          rgba(200, 190, 255, 0.95) 50%,
          rgba(98, 102, 230, 0.85) 65%,
          transparent 100%
        );
      }

      .change-ip-flyout.is-open .change-ip-flyout__btn {
        animation-name: change-ip-pill-in, change-ip-reveal-sweep;
        animation-duration: 0.42s, 1.28s;
        animation-timing-function: cubic-bezier(0.22, 1, 0.36, 1), ease-in-out;
        animation-delay: 0s, 0s;
        animation-iteration-count: 1, 2;
        animation-fill-mode: forwards, forwards;
      }

      .change-ip-flyout.is-open .change-ip-flyout__btn::after {
        animation-name: change-ip-top-glint;
        animation-duration: 0.85s;
        animation-timing-function: ease-in-out;
        animation-iteration-count: 2;
        animation-fill-mode: forwards;
        animation-delay: 0s;
      }

      .change-ip-flyout.is-open .change-ip-flyout__btn:nth-child(2) {
        animation-delay: 0.04s, 0.04s;
      }

      .change-ip-flyout.is-open .change-ip-flyout__btn:nth-child(2)::after,
      .change-ip-flyout.is-open .change-ip-flyout__btn:nth-child(2) svg {
        animation-delay: 0.04s;
      }

      .change-ip-flyout.is-open .change-ip-flyout__btn:nth-child(3) {
        animation-delay: 0.1s, 0.1s;
      }

      .change-ip-flyout.is-open .change-ip-flyout__btn:nth-child(3)::after,
      .change-ip-flyout.is-open .change-ip-flyout__btn:nth-child(3) svg {
        animation-delay: 0.1s;
      }

      .change-ip-flyout.is-open .change-ip-flyout__btn:nth-child(4) {
        animation-delay: 0.16s, 0.16s;
      }

      .change-ip-flyout.is-open .change-ip-flyout__btn:nth-child(4)::after,
      .change-ip-flyout.is-open .change-ip-flyout__btn:nth-child(4) svg {
        animation-delay: 0.16s;
      }

      .change-ip-flyout.is-open .change-ip-flyout__btn:nth-child(5) {
        animation-delay: 0.22s, 0.22s;
      }

      .change-ip-flyout.is-open .change-ip-flyout__btn:nth-child(5)::after,
      .change-ip-flyout.is-open .change-ip-flyout__btn:nth-child(5) svg {
        animation-delay: 0.22s;
      }

      @keyframes change-ip-pill-in {
        from {
          opacity: 0;
          transform: translateX(-12px) scale(0.96);
        }
        to {
          opacity: 1;
          transform: translateX(0) scale(1);
        }
      }

      @keyframes change-ip-reveal-sweep {
        0%,
        100% {
          border-color: rgba(255, 255, 255, 0.08);
          background-color: rgba(255, 255, 255, 0.02);
          background-image: none;
          box-shadow: inset 0 0 0 0 rgba(98, 102, 230, 0);
        }
        14% {
          border-color: rgba(98, 102, 230, 0.38);
          background-image: linear-gradient(
            105deg,
            rgba(98, 102, 230, 0) 0%,
            rgba(98, 102, 230, 0.18) 38%,
            rgba(255, 255, 255, 0.08) 50%,
            rgba(98, 102, 230, 0.18) 62%,
            rgba(98, 102, 230, 0) 100%
          );
          background-size: 240% 100%;
          background-position: 100% 0;
          background-repeat: no-repeat;
          box-shadow: inset 0 0 20px rgba(98, 102, 230, 0.1);
        }
        38% {
          background-position: 35% 0;
          border-color: rgba(98, 102, 230, 0.45);
        }
        58% {
          background-position: -35% 0;
          border-color: rgba(98, 102, 230, 0.28);
        }
        82% {
          background-position: -100% 0;
          border-color: rgba(255, 255, 255, 0.12);

      #statusTooltip.status-tooltip-pop {

        font-weight: 500;

        pointer-events: none;
        opacity: 0;
        visibility: hidden;
        transition: opacity 0.14s ease-out, visibility 0.14s ease-out;
      }

      #statusTooltip.status-tooltip-pop.is-visible {
        opacity: 1;
        visibility: visible;
      }

      .check {
        appearance: none;
        -webkit-appearance: none;
        display: inline-grid;
        place-content: center;
        width: 16px;
        height: 16px;
        border-radius: 2px;
        margin: 0;
        background: transparent;
        border: 1px solid rgba(255, 255, 255, 0.4);
        cursor: pointer;
      }

      .check::after {
        content: "";
        width: 8px;
        height: 5px;
        border-left: 2px solid rgba(255, 255, 255, 1);
        border-bottom: 2px solid rgba(255, 255, 255, 1);
        transform: rotate(-45deg) scale(0);
        transform-origin: center;
      }

      .check:checked {
        border-color: rgba(255, 255, 255, 1);
      }

      .check:checked::after {
        transform: rotate(-45deg) scale(1);
      }

      .check:indeterminate {
        border-color: rgba(255, 255, 255, 1);
      }

      .check:indeterminate::after {
        width: 8px;
        height: 2px;
        border: 0;
        border-radius: 1px;
        background: rgba(255, 255, 255, 1);
        transform: none;
      }

      .check:focus-visible {
        outline: 2px solid rgba(255, 255, 255, 0.55);
        outline-offset: 0;
      }

      table.data-table .check {
        scroll-margin: 0;
      }

      .camera-thumb {

        width: 64px;
        height: 36px;
        z-index: 0;

      .camera-thumb-inner {
        position: relative;

        height: 100%;

        overflow: hidden;
        background: linear-gradient(145deg, #2a3a56, #162238);

      }

      .camera-thumb-inner img {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .camera-thumb-inner::after {
        content: "";
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.2);
        pointer-events: none;
      }

      .camera-thumb-hover {
        position: absolute;
        left: 50%;
        top: 50%;
        z-index: 2;
        width: 160px;
        height: 90px;
        margin: 0;
        padding: 0;
        border-radius: 4px;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.14);
        box-shadow: 0 10px 28px rgba(0, 0, 0, 0.1), 0 4px 12px rgba(0, 0, 0, 0.1);
        background: #0f1218;
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.96);
        pointer-events: none;
        transition: opacity 0.16s ease, transform 0.16s ease;
      }

      .camera-thumb-hover img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .camera-thumb:hover .camera-thumb-hover {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
        pointer-events: auto;
      }

      .uc-modal-backdrop {
        position: fixed;
        inset: 0;
        z-index: 2400;

        align-items: center;

      .uc-modal-backdrop.is-open {

        padding: 28px 28px 22px;

        transition: transform 0.22s ease, opacity 0.22s ease;

      .uc-modal-backdrop.is-open .uc-modal {
        transform: scale(1) translateY(0);

      .uc-modal__title {

  <body>
    <div class="app-root">
      <section id="wizardScreen" class="screen wizard-screen">
        <div class="wizard-shell">
          <header class="elevator-topbar">
            <div class="elevator-topbar__left">
              <button type="button" class="elevator-topbar__back" aria-label="Volver">
                <img src="/assets/elevator-form/icon-back.svg" alt="" width="20" height="20" />

              <button type="button" class="elevator-topbar__link">History</button>
              <button type="button" class="elevator-topbar__menu" aria-label="Menú">

              </button>
            </div>
          </header>

            <div class="wizard-illustration-art" id="wizardIllustrationArt" data-illustration="default">
              <div class="wizard-illustration-stack">
                <img
                  class="wizard-illustration-img is-layer-active"
                  src="/1panasonic.png"
                  alt=""
                />
                <img
                  class="wizard-illustration-img"
                  src="/1panasonic.png"
                  alt=""
                />
              </div>
            </div>
          </aside>

          <main class="wizard-content">
            <div class="wizard-content-inner">
              <h1 class="elevator-form-title">Create a new elevator</h1>

              <form class="elevator-form" id="elevatorForm" novalidate>
                <div class="elevator-form-fields">
                <div class="elevator-form-grid elevator-form-grid--2">
                  <div class="field" data-illustration-key="elevator-name">
                    <label for="elevatorName">Elevator name</label>
                    <input
                      id="elevatorName"
                      name="elevatorName"
                      type="text"
                      value="Elevator Floor 1"
                      autocomplete="off"
                    />
                  </div>
                  <div class="field" data-illustration-key="description">
                    <label for="elevatorDescription" class="field-label-muted">Description</label>
                    <input
                      id="elevatorDescription"
                      name="elevatorDescription"
                      type="text"
                      placeholder="Description here"
                      autocomplete="off"
                    />
                  </div>
                </div>

                <div class="elevator-form-grid elevator-form-grid--3">
                  <div class="field field-dropdown custom-dropdown" data-illustration-key="controller" data-dropdown>
                    <label id="controllerLabel">Controller</label>
                    <div class="custom-dropdown__root">
                      <input type="hidden" name="controller" id="controller" value="" />
                      <button type="button" class="custom-dropdown__trigger" id="controllerTrigger" aria-labelledby="controllerLabel" aria-expanded="false" aria-haspopup="listbox">
                        <span class="custom-dropdown__label is-placeholder">Select</span>
                        <span class="custom-dropdown__chev" aria-hidden="true"><img src="/assets/elevator-form/icon-chevron.svg" alt="" width="8" height="4" /></span>
                      </button>
                      <div class="custom-dropdown__panel" role="listbox" hidden>
                        <button type="button" class="custom-dropdown__option" role="option" data-value="pac-main">PAC-500 Main</button>
                        <button type="button" class="custom-dropdown__option" role="option" data-value="pac-secondary">PAC-500 Secondary</button>
                        <button type="button" class="custom-dropdown__option" role="option" data-value="ctrl-v2">Elevator Ctrl v2</button>
                      </div>
                    </div>
                  </div>
                  <div class="field field-dropdown custom-dropdown" data-illustration-key="reader" data-dropdown>
                    <label id="readerLabel">Reader</label>
                    <div class="custom-dropdown__root">
                      <input type="hidden" name="reader" id="reader" value="" />
                      <button type="button" class="custom-dropdown__trigger" id="readerTrigger" aria-labelledby="readerLabel" aria-expanded="false" aria-haspopup="listbox">
                        <span class="custom-dropdown__label is-placeholder">Select</span>
                        <span class="custom-dropdown__chev" aria-hidden="true"><img src="/assets/elevator-form/icon-chevron.svg" alt="" width="8" height="4" /></span>
                      </button>
                      <div class="custom-dropdown__panel" role="listbox" hidden>
                        <button type="button" class="custom-dropdown__option" role="option" data-value="wiegand-1">Wiegand Reader 1</button>
                        <button type="button" class="custom-dropdown__option" role="option" data-value="osdp-a">OSDP Reader A</button>
                        <button type="button" class="custom-dropdown__option" role="option" data-value="ble">Bluetooth Reader</button>
                      </div>
                    </div>
                  </div>
                  <div class="field field-dropdown custom-dropdown" data-illustration-key="site" data-dropdown>

                      </div>
                    </div>
                  </div>

                        <p class="field-hint">Where should floor access start?</p>

                        <input id="firstFloorOut" name="firstFloorOut" type="number" value="0" min="0" />

                    </div>
                    <div class="field field-stacked" data-illustration-key="floor-tracking">

                      </div>
                      <div class="field-input field-input--suffix">
                        <input id="floorTrackingIn" name="floorTrackingIn" type="number" value="0" min="0" />
                        <span class="field-suffix">200 IN Avail</span>
                      </div>
                    </div>
                  </div>
                </section>

                <section class="form-card" data-illustration-key="times">
                  <header class="form-card__header">Times</header>
                  <div class="form-card__body elevator-form-grid elevator-form-grid--2">
                    <div class="field field-stacked" data-illustration-key="button-time">
                      <div class="field-heading">
                        <label for="buttonTime">Button time</label>
                        <p class="field-hint">How long should floor buttons remain active?</p>
                      </div>
                      <div class="field-input field-input--unit">
                        <input id="buttonTime" name="buttonTime" type="number" value="0" min="0" />
                        <div class="unit-segment" data-unit-group="buttonTime">
                          <button type="button" class="unit-segment__btn is-active" data-unit="sec">Sec</button>
                          <button type="button" class="unit-segment__btn" data-unit="min">Min</button>
                        </div>
                      </div>
                    </div>
                    <div class="field field-stacked" data-illustration-key="relay-strike">
                      <div class="field-heading">
                        <label for="relayStrike">Relay strike</label>
                        <p class="field-hint">How long should access remain active?</p>
                      </div>
                      <div class="field-input field-input--unit">
                        <input id="relayStrike" name="relayStrike" type="number" value="0" min="0" />
                        <div class="unit-segment" data-unit-group="relayStrike">
                          <button type="button" class="unit-segment__btn is-active" data-unit="sec">Sec</button>
                          <button type="button" class="unit-segment__btn" data-unit="min">Min</button>
                        </div>
                      </div>
                    </div>
                  </div>
                </section>
              </form>
            </div>
            <div class="elevator-form-footer">
              <button type="submit" form="elevatorForm" class="btn btn-save" id="saveElevatorBtn">Save</button>
            </div>
          </main>
        </div>
      </section>

    </div>

    <script>
      const wizardIllustrationArt = document.getElementById("wizardIllustrationArt");
      const elevatorForm = document.getElementById("elevatorForm");
      const elevatorNameInput = document.getElementById("elevatorName");
      const topbarContext = document.querySelector(".elevator-topbar__context");

      const ILLUSTRATION_PRIMARY_SRC = "/1panasonic.png";

      const illustrationSources = {
        default: ILLUSTRATION_PRIMARY_SRC,
        "elevator-name": ILLUSTRATION_PRIMARY_SRC,
        description: ILLUSTRATION_PRIMARY_SRC,
        controller: "/Panasonic2.png",
      };

      const illustrationAssetKeys = new Set(["elevator-name", "description", "controller"]);

      const illustrationObjectPositionBySrc = {
        [ILLUSTRATION_PRIMARY_SRC]: "center center",
        "/Panasonic2.png": "40% center",
      };

      const illustrationOpacity = {
        default: 0.3,
        reader: 0.38,
        site: 0.38,
        "floor-access": 0.4,
        "floor-count": 0.44,
        "first-floor": 0.44,
        "floor-tracking": 0.44,
        times: 0.4,
        "button-time": 0.42,
        "relay-strike": 0.42,
      };

      function resolveIllustrationKey(target) {
        if (!target || !target.closest) return "default";
        if (typeof target === "object" && target.dataset && target.dataset.illustrationKey) {
          return target.dataset.illustrationKey;
        }
        const field = target.closest("[data-illustration-key]");
        if (field) return field.dataset.illustrationKey;
        const card = target.closest(".form-card[data-illustration-key]");
        if (card) return card.dataset.illustrationKey;
        return "default";
      }

      function isKnownIllustrationKey(key) {
        return illustrationSources[key] != null || illustrationOpacity[key] != null;
      }

      const ILLUSTRATION_MOTION_MS = 700;
      const ILLUSTRATION_EXIT_EASING = "cubic-bezier(0.4, 0, 1, 1)";
      const ILLUSTRATION_ENTER_EASING = "cubic-bezier(0, 0, 0.2, 1)";
      let illustrationTransitionId = 0;

      function getIllustrationLayers() {
        const stack = wizardIllustrationArt?.querySelector(".wizard-illustration-stack");
        if (!stack) return null;
        const layers = [...stack.querySelectorAll(".wizard-illustration-img")];
        const active = stack.querySelector(".wizard-illustration-img.is-layer-active");
        const inactive = layers.find((layer) => layer !== active);
        if (!active || !inactive) return null;
        return { active, inactive };
      }

      function preloadIllustration(src) {
        return new Promise((resolve) => {
          const image = new Image();
          image.onload = () => resolve();
          image.onerror = () => resolve();
          image.src = src;
        });
      }

      function resetIllustrationLayerMotion(layer) {
        layer.style.animation = "";
      }

      function runIllustrationLayerMotion(layer, animationName, easing) {
        return new Promise((resolve) => {
          let settled = false;
          const finish = (event) => {
            if (settled) return;
            if (event && event.target !== layer) return;
            settled = true;
            window.clearTimeout(fallbackTimer);
            layer.removeEventListener("animationend", finish);
            layer.removeEventListener("animationcancel", finish);
            resetIllustrationLayerMotion(layer);
            resolve();
          };

          const fallbackTimer = window.setTimeout(finish, ILLUSTRATION_MOTION_MS + 100);
          layer.addEventListener("animationend", finish);
          layer.addEventListener("animationcancel", finish);
          layer.style.animation = `${animationName} ${ILLUSTRATION_MOTION_MS}ms ${easing} both`;
        });
      }

      function clearIllustrationMotionClasses(...layers) {
        layers.forEach((layer) => {
          resetIllustrationLayerMotion(layer);
        });
      }

      function setIllustrationMotionTokens(isAsset, fromOpacity) {
        wizardIllustrationArt.style.setProperty(
          "--illustration-target-opacity",
          isAsset ? "1" : "0.3"
        );
        wizardIllustrationArt.style.setProperty("--illustration-from-opacity", String(fromOpacity));
      }

      function getIllustrationObjectPosition(src) {
        return illustrationObjectPositionBySrc[src] ?? "center center";
      }

      function applyIllustrationLayerLayout(layer, src) {
        const position = getIllustrationObjectPosition(src);
        layer.style.objectPosition = position;
      }

      function shouldChangeIllustration(key) {
        return key === "default" || illustrationSources[key] != null;
      }

      function setIllustrationRestState() {
        const layers = getIllustrationLayers();
        if (!layers) return;
        const { active, inactive } = layers;
        [active, inactive].forEach((layer) => {
          layer.src = ILLUSTRATION_PRIMARY_SRC;
          applyIllustrationLayerLayout(layer, ILLUSTRATION_PRIMARY_SRC);
          layer.style.animation = "";
        });
        active.classList.add("is-layer-active");
        inactive.classList.remove("is-layer-active");
        wizardIllustrationArt.dataset.illustration = "default";
        wizardIllustrationArt.classList.remove("is-illustration-asset");
      }

      function getIllustrationLayerOpacity(layer) {
        const art = wizardIllustrationArt;
        if (!art || !layer.classList.contains("is-layer-active")) return 0;
        if (art.classList.contains("is-illustration-asset")) return 1;
        return 0.3;
      }

      function setIllustrationFocusState(illustrationKey, isAsset) {
        wizardIllustrationArt.dataset.illustration = illustrationKey;
        wizardIllustrationArt.classList.toggle("is-illustration-asset", isAsset);
      }

      async function setWizardIllustration(key) {
        if (!wizardIllustrationArt) return;
        const illustrationKey = isKnownIllustrationKey(key) ? key : "default";
        if (!shouldChangeIllustration(illustrationKey)) return;

        const src = illustrationSources[illustrationKey] ?? ILLUSTRATION_PRIMARY_SRC;
        const isAsset = illustrationAssetKeys.has(illustrationKey);
        const layers = getIllustrationLayers();
        if (!layers) return;

        const { active, inactive } = layers;
        const currentSrc = active.getAttribute("src") || "";
        const srcChanged = currentSrc !== src;

        if (!srcChanged) {
          setIllustrationFocusState(illustrationKey, isAsset);
          return;
        }

        const transitionId = ++illustrationTransitionId;
        applyIllustrationLayerLayout(inactive, src);

        await preloadIllustration(src);
        if (transitionId !== illustrationTransitionId) return;

        const fromOpacity = getIllustrationLayerOpacity(active);
        setIllustrationMotionTokens(isAsset, fromOpacity);

        inactive.src = src;
        setIllustrationFocusState(illustrationKey, isAsset);

        clearIllustrationMotionClasses(active, inactive);

        inactive.classList.add("is-layer-active");
        active.classList.remove("is-layer-active");

        await Promise.all([
          runIllustrationLayerMotion(active, "illustration-exit", ILLUSTRATION_EXIT_EASING),
          runIllustrationLayerMotion(inactive, "illustration-enter", ILLUSTRATION_ENTER_EASING),
        ]);

        if (transitionId !== illustrationTransitionId) return;

        clearIllustrationMotionClasses(active, inactive);
        applyIllustrationLayerLayout(active, src);
      }

      function bindIllustrationFocus() {
        const wizardRoot = document.getElementById("wizardScreen");
        if (!wizardRoot) return;
        setIllustrationRestState();
        wizardRoot.addEventListener("focusin", (event) => {
          setWizardIllustration(resolveIllustrationKey(event.target));
        });
      }

      let activeDropdown = null;

      function closeDropdown(dropdown) {
        if (!dropdown) return;
        const trigger = dropdown.querySelector(".custom-dropdown__trigger");
        const panel = dropdown.querySelector(".custom-dropdown__panel");
        dropdown.classList.remove("is-open");
        if (trigger) trigger.setAttribute("aria-expanded", "false");
        if (panel) panel.setAttribute("hidden", "");
        if (activeDropdown === dropdown) activeDropdown = null;
      }

      function closeAllDropdowns(except) {
        document.querySelectorAll(".custom-dropdown.is-open").forEach((dd) => {
          if (dd !== except) closeDropdown(dd);
        });
      }

      function openDropdown(dropdown) {
        closeAllDropdowns(dropdown);
        const trigger = dropdown.querySelector(".custom-dropdown__trigger");
        const panel = dropdown.querySelector(".custom-dropdown__panel");
        dropdown.classList.add("is-open");
        if (trigger) trigger.setAttribute("aria-expanded", "true");
        if (panel) panel.removeAttribute("hidden");
        activeDropdown = dropdown;
        setWizardIllustration(resolveIllustrationKey(dropdown));
      }

      function selectDropdownOption(dropdown, option) {
        const hidden = dropdown.querySelector('input[type="hidden"]');
        const label = dropdown.querySelector(".custom-dropdown__label");
        const value = option.dataset.value || "";
        const text = option.textContent.trim();

        if (hidden) hidden.value = value;
        if (label) {
          label.textContent = text;
          label.classList.toggle("is-placeholder", !value);
        }

        dropdown.querySelectorAll(".custom-dropdown__option").forEach((opt) => {
          opt.classList.toggle("is-selected", opt === option);
        });

        closeDropdown(dropdown);
      }

      function bindCustomDropdowns() {
        document.querySelectorAll("[data-dropdown]").forEach((dropdown) => {
          const trigger = dropdown.querySelector(".custom-dropdown__trigger");
          const panel = dropdown.querySelector(".custom-dropdown__panel");
          const options = dropdown.querySelectorAll(".custom-dropdown__option");

          if (!trigger || !panel) return;

          trigger.addEventListener("click", (event) => {
            event.stopPropagation();
            if (dropdown.classList.contains("is-open")) {
              closeDropdown(dropdown);
            } else {
              openDropdown(dropdown);
            }
          });

          options.forEach((option) => {
            option.addEventListener("click", (event) => {
              event.stopPropagation();
              selectDropdownOption(dropdown, option);
            });
          });
        });

        document.addEventListener("click", (event) => {
          if (event.target.closest("[data-dropdown]")) return;
          closeAllDropdowns();
        });

        document.addEventListener("keydown", (event) => {
          if (event.key === "Escape") closeAllDropdowns();
        });
      }

      function bindUnitSegments() {
        document.querySelectorAll(".unit-segment").forEach((segment) => {
          segment.addEventListener("click", (event) => {
            const btn = event.target.closest(".unit-segment__btn");
            if (!btn) return;
            segment.querySelectorAll(".unit-segment__btn").forEach((el) => {
              el.classList.toggle("is-active", el === btn);
            });
          });
        });
      }

      function bindTopbarTitleSync() {
        if (!elevatorNameInput || !topbarContext) return;
        const sync = () => {
          const value = elevatorNameInput.value.trim();
          topbarContext.textContent = value || "Elevator name";
        };
        elevatorNameInput.addEventListener("input", sync);
        sync();
      }

      function bindFormSubmit() {
        if (!elevatorForm) return;
        elevatorForm.addEventListener("submit", (event) => {
          event.preventDefault();
        });
      }

      function bindFloorTrackingToggle() {
        const toggle = document.getElementById("floorTrackingToggle");
        const input = document.getElementById("floorTrackingIn");
        if (!toggle || !input) return;
        const sync = () => {
          input.disabled = !toggle.checked;
          input.style.opacity = toggle.checked ? "1" : "0.45";
        };
        toggle.addEventListener("change", sync);
        sync();
      }

      bindIllustrationFocus();
      bindCustomDropdowns();
      bindUnitSegments();
      bindTopbarTitleSync();
      bindFormSubmit();
      bindFloorTrackingToggle();
    </script>
  </body>
</html>
